services:
  postgres:
    image: postgres:15-alpine
    container_name: payway-postgres
    platform: linux/amd64
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: transactionprimarydb
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - payway-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transactionprimarydb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  payway-app:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    container_name: payway-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transactionprimarydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/transactionprimarydb
      SPRING_FLYWAY_USER: postgres
      SPRING_FLYWAY_PASSWORD: password
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      # Redis configuration (descomente se habilitar Redis)
      # SPRING_DATA_REDIS_HOST: redis
      # SPRING_DATA_REDIS_PORT: 6379
      # SPRING_DATA_REDIS_PASSWORD: redispassword
    ports:
      - "8080:8080"
    volumes:
      - ./target/classes:/workspace/app:ro
    depends_on:
      postgres:
        condition: service_healthy
      # redis:
      #   condition: service_healthy
    networks:
      - payway-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./target/classes
          target: /workspace/app

  # redis:
  #   image: redis:7-alpine
  #   container_name: payway-redis
  #   platform: linux/amd64
  #   command: redis-server --appendonly yes --requirepass redispassword
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - payway-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  # redis_data:
  #   driver: local

networks:
  payway-network:
    name: payway-network
    driver: bridge
